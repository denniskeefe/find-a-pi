<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find a Private Investigator</title>

  <!-- Widget stylesheet -->
  <link rel="stylesheet" href="find-a-pi.css" />

  <style>
    /* Page chrome — not part of the widget */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .page-header {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .page-header h1 {
      margin: 0 0 0.5rem;
      font-size: 1.875rem;
      font-weight: 700;
      color: #111827;
    }

    .page-header p {
      margin: 0;
      color: #6b7280;
      font-size: 1rem;
    }

    .page-body {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }
  </style>
</head>
<body>

  <header class="page-header">
    <h1>Find a Private Investigator</h1>
    <p>Search our directory of licensed private investigators by location and specialty.</p>
  </header>

  <main class="page-body">

    <!-- ✅ Widget mount point — drop this div wherever you want the widget -->
    <div id="find-a-pi"></div>

  </main>

  <!--
    Widget script — place before </body>
    data-src:       path to your pi-data.json
    data-container: id of the div above (defaults to "find-a-pi")
  -->
  <script
    src="find-a-pi.js"
    data-src="pi-data.json"
    data-container="find-a-pi"
  ></script>

</body>
</html>
